spring.application.name=trip-trove
springdoc.api-docs.path=/api-docs
manager.request.page-size=20
manager.request.suggestion-limit=10
manager.request.total-countries=195
# DB setup
spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}?useSSL=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Liquibase owns schema evolution; Hibernate only validates that the mapped
# entities match the database schema produced by the changelog.
spring.jpa.hibernate.ddl-auto=validate
# Liquibase
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true
# Enable local setup
spring.profiles.active=dev